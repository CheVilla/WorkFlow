<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>FlowDesk</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f11;--bg2:#17171a;--bg3:#1e1e22;--bg4:#26262c;
  --border:#2e2e36;--border2:#3a3a44;
  --text:#f0eff4;--text2:#9896a4;--text3:#5c5a6b;
  --accent:#7c6af7;--accent2:#9d8fff;--accent-bg:rgba(124,106,247,0.12);
  --green:#4ade80;--green-bg:rgba(74,222,128,0.1);
  --amber:#fbbf24;--amber-bg:rgba(251,191,36,0.1);
  --red:#f87171;--red-bg:rgba(248,113,113,0.1);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,0.1);
  --pomo:#ff6b6b;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:10px;--rs:6px;--bnav:60px;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;overflow:hidden}
#app{display:flex;height:100vh;overflow:hidden;position:relative}

/* SIDEBAR */
#sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:0 0 16px;flex-shrink:0;transition:transform .25s}
.logo{padding:18px 16px 14px;font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);letter-spacing:-.3px}
.logo span{color:var(--accent)}
.sec{padding:12px 10px 4px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text3)}
.ni{display:flex;align-items:center;gap:10px;padding:8px 12px;margin:1px 6px;border-radius:var(--rs);cursor:pointer;color:var(--text2);font-size:13px;transition:all .15s;user-select:none;border:none;background:none;width:calc(100% - 12px);text-align:left}
.ni:hover{background:var(--bg3);color:var(--text)}
.ni.active{background:var(--accent-bg);color:var(--accent2);font-weight:500}
.ni i{font-size:16px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.proj-item{display:flex;align-items:center;gap:8px;padding:7px 12px;margin:1px 6px;border-radius:var(--rs);cursor:pointer;color:var(--text2);font-size:13px;transition:all .15s;user-select:none}
.proj-item:hover{background:var(--bg3);color:var(--text)}
.proj-item.active{background:var(--bg4);color:var(--text)}
.proj-item .pname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.addp{display:flex;align-items:center;gap:8px;padding:7px 12px;margin:4px 6px;border-radius:var(--rs);cursor:pointer;color:var(--text3);font-size:12px;transition:all .15s;border:none;background:none;width:calc(100% - 12px)}
.addp:hover{color:var(--accent)}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--bg);flex-shrink:0}
.topbar h1{font-size:17px;font-weight:600;flex:1;letter-spacing:-.3px}
.tacts{display:flex;gap:8px;align-items:center}
#content{flex:1;overflow:hidden}
.view{display:none;height:100%;overflow-y:auto;overflow-x:hidden}
.view.active{display:flex;flex-direction:column}

/* BOTTOM NAV */
#bnav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bnav);background:var(--bg2);border-top:1px solid var(--border);z-index:50;flex-direction:row}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--text3);font-size:10px;font-weight:500;transition:color .15s;padding:6px 0;border:none;background:none}
.bni i{font-size:21px}
.bni.active{color:var(--accent)}

/* FAB */
#fab{display:none;position:fixed;bottom:calc(var(--bnav) + 14px);right:16px;width:50px;height:50px;border-radius:50%;background:var(--accent);color:white;border:none;cursor:pointer;align-items:center;justify-content:center;font-size:24px;box-shadow:0 4px 20px rgba(124,106,247,.45);z-index:49;transition:transform .15s}
#fab:active{transform:scale(.92)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text);transition:all .15s;font-family:var(--font)}
.btn:hover{background:var(--bg4)}
.btnp{background:var(--accent);border-color:var(--accent);color:#fff}
.btnp:hover{background:var(--accent2);border-color:var(--accent2)}
.btng{background:transparent;border-color:transparent;color:var(--text2)}
.btng:hover{background:var(--bg3);color:var(--text)}
.btnd{background:var(--red-bg);border-color:transparent;color:var(--red)}
.btnd:hover{background:rgba(248,113,113,.2)}

/* CARDS & COMMON */
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.sl{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:8px}
.sv{font-size:26px;font-weight:600;letter-spacing:-.5px}
.ss{font-size:12px;color:var(--text3);margin-top:4px}
.stitle{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.6px}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;overflow:hidden}
.sb{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.sb-l{background:var(--bg4);color:var(--text3)}
.sb-m{background:var(--amber-bg);color:var(--amber)}
.sb-h{background:var(--red-bg);color:var(--red)}
.es{text-align:center;color:var(--text3);padding:32px 16px}
.es i{font-size:30px;display:block;margin-bottom:10px;opacity:.4}
.es p{font-size:12px}

/* DASHBOARD */
.dgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:20px 20px 0}
.dbody{padding:16px 20px 20px;display:grid;grid-template-columns:1fr 1fr;gap:16px;flex:1}
.task-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer}
.task-row:last-child{border-bottom:none}
.task-row:hover{opacity:.8}
.task-row .tn{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer}
.proj-row:last-child{border-bottom:none}
.proj-row:hover{opacity:.8}
.proj-info{flex:1;min-width:0}
.proj-info .pn{font-size:13px;font-weight:500}
.proj-info .pd{font-size:11px;color:var(--text3);margin-top:1px}
.prog-wrap{width:70px;flex-shrink:0}
.prog-bg{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.prog-fill{height:4px;border-radius:2px;transition:width .4s}
.prog-pct{font-size:10px;color:var(--text3);text-align:right;margin-top:2px}

/* KANBAN */
.kwrap{padding:16px;flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch}
.kboard{display:flex;gap:12px;min-height:calc(100vh - 160px)}
.kcol{flex:0 0 260px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:8px;max-height:calc(100vh - 160px);overflow-y:auto}
.col-hdr{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-shrink:0}
.col-title{font-size:13px;font-weight:600}
.col-count{font-size:11px;color:var(--text3);background:var(--bg4);border-radius:10px;padding:1px 7px}
.col-add{margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;display:flex;align-items:center;padding:2px}
.col-add:hover{color:var(--accent)}
.tc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:12px;cursor:pointer;transition:border-color .15s;user-select:none;-webkit-user-select:none}
.tc:hover{border-color:var(--border2)}
.tc.dragging{opacity:.4;transform:scale(.97)}
.tc.drag-over{border-color:var(--accent)}
.tc-title{font-size:13px;font-weight:500;margin-bottom:8px;line-height:1.4}
.tc-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tc-dl{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px}
.tc-dl.ov{color:var(--red)}
.tc-pomo{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px;margin-left:auto}
.kcol.drop-active{border-color:var(--accent);background:var(--accent-bg)}

/* CALENDAR */
.cwrap{padding:16px;flex:1}
.cal-hdr{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.cal-month{font-size:17px;font-weight:600;flex:1}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dn{text-align:center;font-size:10px;font-weight:600;color:var(--text3);padding:4px 0;text-transform:uppercase}
.cal-day{min-height:70px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:6px;cursor:pointer;transition:border-color .15s}
.cal-day:hover{border-color:var(--border2)}
.cal-day.today{border-color:var(--accent)}
.cal-day.other .day-num{color:var(--text3)}
.day-num{font-size:12px;font-weight:500;margin-bottom:3px}
.cal-task{font-size:9px;padding:2px 4px;border-radius:3px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}

/* POMODORO */
.pwrap{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.pcont{width:100%;max-width:480px}
.ptabs{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:4px;margin-bottom:16px}
.ptab{flex:1;text-align:center;padding:8px 4px;border-radius:var(--rs);cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .15s}
.ptab.active{background:var(--pomo);color:white}
.pdisp{text-align:center;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:32px 20px 24px;margin-bottom:14px}
.ptime{font-size:68px;font-weight:300;letter-spacing:-2px;font-family:var(--mono);color:var(--text);line-height:1;margin-bottom:6px}
.ptime.run{color:var(--pomo)}
.ptime.brk{color:var(--green)}
.pphase{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px}
.pctrls{display:flex;justify-content:center;gap:12px;align-items:center}
.pbtn{width:48px;height:48px;border-radius:50%;border:1px solid var(--border2);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);transition:all .15s;font-size:18px}
.pbtn:hover{background:var(--bg4)}
.pbtn.play{background:var(--pomo);border-color:var(--pomo);color:white;width:62px;height:62px;font-size:22px}
.pbtn.play:hover{opacity:.88}
.pprog{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-bottom:14px}
.pprogb{height:3px;border-radius:2px;transition:width .5s linear}
.pdots{display:flex;gap:5px;justify-content:center;margin-top:12px}
.pdot{width:9px;height:9px;border-radius:50%;background:var(--bg4);border:1px solid var(--border)}
.pdot.on{background:var(--pomo);border-color:var(--pomo)}
.psel{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:var(--rs);padding:10px 12px;width:100%;font-family:var(--font);font-size:13px;margin-bottom:12px;cursor:pointer}
.psel:focus{outline:none;border-color:var(--accent)}
.pset{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-top:12px}
.pset h4{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text2)}
.pset-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.pset-row label{font-size:12px;color:var(--text2);width:120px;flex-shrink:0}
.pset-row input[type=number]{width:60px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);padding:6px 10px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none}
.pset-row input[type=number]:focus{border-color:var(--accent)}
.pset-row input[type=range]{flex:1;min-width:80px}
.sess-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)}
.sess-row:last-child{border-bottom:none}

/* REPORT */
.rwrap{padding:16px;flex:1;overflow-y:auto}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.rtbl{width:100%;border-collapse:collapse}
.rtbl th{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}
.rtbl td{padding:10px 10px;font-size:13px;border-bottom:1px solid var(--border)}
.rtbl tr:last-child td{border-bottom:none}
.rtbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}

/* MODALS */
.moverlay{position:absolute;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.moverlay.hidden{display:none}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px 16px 0 0;padding:20px;width:100%;max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:600;margin-bottom:16px}
.fr{margin-bottom:12px}
.fl{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px;display:block}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);padding:10px 12px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--accent)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cpick{display:flex;gap:10px;flex-wrap:wrap;padding:4px 0}
.csw{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s;flex-shrink:0}
.csw:hover{transform:scale(1.12)}
.csw.sel{border-color:white;transform:scale(1.1)}
.macts{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* NOTIFICATIONS */
.notif{position:absolute;top:12px;left:12px;right:12px;z-index:200;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:12px 14px;display:flex;align-items:flex-start;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:slin .25s ease;max-width:400px;margin:0 auto}
@keyframes slin{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.notif-icon{font-size:18px;flex-shrink:0}
.notif-body h4{font-size:13px;font-weight:600;margin-bottom:1px}
.notif-body p{font-size:11px;color:var(--text2)}

/* SYNC INDICATOR */
#sync{position:fixed;top:10px;right:14px;font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px;z-index:300;transition:opacity .3s;opacity:0}
#sync.show{opacity:1}
#sync i{font-size:13px}

/* LOADING SCREEN */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:1000;transition:opacity .4s}
#loading.fade{opacity:0;pointer-events:none}
.spin{width:32px;height:32px;border:2px solid var(--bg4);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

/* ── MOBILE ── */
@media(max-width:640px){
  #sidebar{display:none}
  #bnav{display:flex}
  #content{padding-bottom:var(--bnav)}
  #fab{display:flex}
  .topbar{padding:10px 14px}
  .topbar h1{font-size:15px}
  .tacts{display:none}
  .dgrid{grid-template-columns:1fr 1fr;padding:12px 12px 0;gap:8px}
  .sc{padding:12px}
  .sv{font-size:20px}
  .dbody{grid-template-columns:1fr;padding:12px;gap:12px}
  .panel{padding:12px}
  .kwrap{padding:10px}
  .kcol{flex:0 0 80vw;max-height:calc(100vh - 150px)}
  .cwrap{padding:10px}
  .cal-day{min-height:44px;padding:4px 3px}
  .day-num{font-size:11px}
  .cal-dn{font-size:9px}
  .pdisp{padding:24px 16px 20px}
  .ptime{font-size:56px}
  .fr2{grid-template-columns:1fr}
  .modal{max-height:92vh;padding:16px}
  #sync{top:auto;bottom:calc(var(--bnav) + 8px);right:10px}
}

/* DESKTOP modal centered */
@media(min-width:641px){
  .moverlay{align-items:center}
  .modal{border-radius:14px;max-width:500px;width:100%}
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div style="font-size:22px;font-weight:600;letter-spacing:-.3px">Flow<span style="color:#7c6af7">Desk</span></div>
  <div class="spin"></div>
  <div style="font-size:12px;color:#5c5a6b" id="load-msg">Connecting...</div>
</div>

<div id="app">

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="logo"><i class="ri-layout-grid-fill" style="color:var(--accent)"></i>Flow<span>Desk</span></div>
  <div style="height:8px"></div>
  <button class="ni active" data-v="dashboard" onclick="sv('dashboard',this)"><i class="ri-dashboard-line"></i>Dashboard</button>
  <button class="ni" data-v="kanban" onclick="sv('kanban',this)"><i class="ri-kanban-view"></i>Kanban</button>
  <button class="ni" data-v="calendar" onclick="sv('calendar',this)"><i class="ri-calendar-line"></i>Calendar</button>
  <button class="ni" data-v="pomodoro" onclick="sv('pomodoro',this)"><i class="ri-timer-line"></i>Pomodoro</button>
  <button class="ni" data-v="report" onclick="sv('report',this)"><i class="ri-bar-chart-line"></i>Report</button>
  <div class="sec" style="margin-top:12px">Projects</div>
  <div id="plist"></div>
  <button class="addp" onclick="openProjModal()"><i class="ri-add-line"></i>New project</button>
</nav>

<!-- MAIN -->
<div id="main">
  <div class="topbar">
    <h1 id="vtitle">Dashboard</h1>
    <div class="tacts" id="tacts">
      <button class="btn btnp" onclick="openTaskModal()"><i class="ri-add-line"></i>New task</button>
      <button class="btn" onclick="openProjModal()"><i class="ri-folder-add-line"></i>New project</button>
    </div>
  </div>
  <div id="content">

    <!-- DASHBOARD -->
    <div class="view active" id="view-dashboard">
      <div class="dgrid" id="dstats"></div>
      <div class="dbody">
        <div class="panel"><div class="stitle">Today's tasks</div><div id="dtoday"></div></div>
        <div class="panel"><div class="stitle">Projects</div><div id="dprojs"></div></div>
      </div>
    </div>

    <!-- KANBAN -->
    <div class="view" id="view-kanban">
      <div class="kwrap"><div class="kboard" id="kboard"></div></div>
    </div>

    <!-- CALENDAR -->
    <div class="view" id="view-calendar">
      <div class="cwrap">
        <div class="cal-hdr">
          <button class="btn btng" onclick="calNav(-1)"><i class="ri-arrow-left-s-line"></i></button>
          <span class="cal-month" id="cmlbl"></span>
          <button class="btn btng" onclick="calNav(1)"><i class="ri-arrow-right-s-line"></i></button>
          <button class="btn" style="padding:5px 10px;font-size:12px" onclick="calNav(0)">Today</button>
        </div>
        <div class="cal-grid" id="cgrid"></div>
      </div>
    </div>

    <!-- POMODORO -->
    <div class="view" id="view-pomodoro">
      <div class="pwrap"><div class="pcont">
        <div class="ptabs">
          <div class="ptab active" id="twrk" onclick="setPMode('work')">Work</div>
          <div class="ptab" id="tbrk" onclick="setPMode('break')">Break</div>
        </div>
        <div class="pdisp">
          <div class="pphase" id="pphase">FOCUS TIME</div>
          <div class="ptime" id="ptime">25:00</div>
          <div class="pprog"><div class="pprogb" id="pbar" style="width:100%"></div></div>
          <div class="pdots" id="pdots"></div>
          <div class="pctrls" style="margin-top:20px">
            <button class="pbtn" onclick="resetP()"><i class="ri-restart-line"></i></button>

<script>
// ─────────────────────────────────────────
// CONFIG — fill these in with your Supabase values
// ─────────────────────────────────────────
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
// ─────────────────────────────────────────

const COLORS=['#7c6af7','#f87171','#4ade80','#fbbf24','#60a5fa','#f472b6','#34d399','#fb923c','#a78bfa','#38bdf8'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_S=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let db = null;
let S = { projects:[], tasks:[], sessions:[], settings:{workMin:25,breakMin:5,volume:70}, activeProj:null, view:'dashboard' };
let editPid=null, editTid=null, defStat='backlog';
let calY, calM;
const now = new Date(); calY=now.getFullYear(); calM=now.getMonth();
let audioCtx=null;
let syncTimer=null;

// ── SUPABASE INIT ──
async function initDB() {
  setLoadMsg('Connecting to database...');
  try {
    db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    await loadState();
  } catch(e) {
    setLoadMsg('Connection failed — using local storage');
    await loadLocalFallback();
  }
  hideLoading();
}

function setLoadMsg(m) { document.getElementById('load-msg').textContent = m; }

function hideLoading() {
  const el = document.getElementById('loading');
  el.classList.add('fade');
  setTimeout(()=>el.remove(), 400);
}

// ── DATA LOADING ──
async function loadState() {
  setLoadMsg('Loading your data...');
  try {
    const [pr, tr, sr, setr] = await Promise.all([
      db.from('projects').select('*'),
      db.from('tasks').select('*'),
      db.from('sessions').select('*'),
      db.from('settings').select('*').eq('id','user').single(),
    ]);
    S.projects = (pr.data||[]).map(r=>r.data);
    S.tasks    = (tr.data||[]).map(r=>r.data);
    S.sessions = (sr.data||[]).map(r=>r.data);
    if (setr.data) S.settings = {...S.settings, ...setr.data.data};
  } catch(e) {
    console.warn('Load error', e);
  }
  if (!S.projects.length) await seed();
  renderAll(); applyPS();
  document.getElementById('svol').value = S.settings.volume||70;
  document.getElementById('svollbl').textContent = (S.settings.volume||70)+'%';
}

async function loadLocalFallback() {
  try {
    const p=localStorage.getItem('pm:projects'), t=localStorage.getItem('pm:tasks'),
          s=localStorage.getItem('pm:sessions'), se=localStorage.getItem('pm:settings');
    if(p) S.projects=JSON.parse(p); if(t) S.tasks=JSON.parse(t);
    if(s) S.sessions=JSON.parse(s); if(se) S.settings={...S.settings,...JSON.parse(se)};
  } catch(e){}
  if (!S.projects.length) seedLocal();
  renderAll(); applyPS();
}

// ── SAVE HELPERS ──
function showSync(msg='Saving...') {
  const el=document.getElementById('sync');
  document.getElementById('sync-msg').textContent=msg;
  el.classList.add('show');
  clearTimeout(syncTimer);
  syncTimer=setTimeout(()=>el.classList.remove('show'),1800);
}

async function upsertRow(table, id, data) {
  if (!db) { localStorage.setItem('pm:'+table, JSON.stringify(data)); return; }
  showSync();
  const { error } = await db.from(table).upsert({ id, data, updated_at: new Date().toISOString() });
  if (error) console.error('Save error', error);
  else showSync('Saved ✓');
}

async function deleteRow(table, id) {
  if (!db) return;
  showSync();
  await db.from(table).delete().eq('id', id);
  showSync('Saved ✓');
}

async function saveProjects() {
  if (!db) { localStorage.setItem('pm:projects', JSON.stringify(S.projects)); return; }
  showSync();
  // upsert each project row
  for (const p of S.projects) {
    await db.from('projects').upsert({ id: p.id, data: p, updated_at: new Date().toISOString() });
  }
  showSync('Saved ✓');
}

async function saveTasks() {
  if (!db) { localStorage.setItem('pm:tasks', JSON.stringify(S.tasks)); return; }
  showSync();
  for (const t of S.tasks) {
    await db.from('tasks').upsert({ id: t.id, data: t, updated_at: new Date().toISOString() });
  }
  showSync('Saved ✓');
}

async function saveSessions() {
  if (!db) { localStorage.setItem('pm:sessions', JSON.stringify(S.sessions)); return; }
  showSync();
  for (const s of S.sessions) {
    if (s.completed) {
      await db.from('sessions').upsert({ id: s.id, data: s, updated_at: new Date().toISOString() });
    }
  }
  showSync('Saved ✓');
}

async function saveSettings() {
  if (!db) { localStorage.setItem('pm:settings', JSON.stringify(S.settings)); return; }
  await db.from('settings').upsert({ id: 'user', data: S.settings, updated_at: new Date().toISOString() });
}

async function seed() {
  const p1=uid(), p2=uid();
  S.projects=[
    {id:p1,title:'Website Redesign',description:'Company website overhaul',color:'#7c6af7',deadline:fmt(addD(now,30)),createdAt:now.toISOString()},
    {id:p2,title:'Mobile App',description:'iOS & Android launch',color:'#4ade80',deadline:fmt(addD(now,60)),createdAt:now.toISOString()},
  ];
  [['Research competitors','Design mockups','Set up CI/CD','Write copy'],
   ['User auth flow','Push notifications','App icon design','Beta testing']].forEach((ts,pi)=>{
    ts.forEach((t,i)=>S.tasks.push({id:uid(),projectId:[p1,p2][pi],title:t,
      status:['backlog','todo','in_progress','done'][i],priority:['low','medium','high','medium'][i],
      deadline:fmt(addD(now,5+i*7)),estimatedPomodoros:2+i,completedPomodoros:i>1?1:0,
      timeTracked:i>1?25:0,createdAt:now.toISOString()}));
  });
  await saveProjects(); await saveTasks();
}

function seedLocal() {
  seed(); // same function, falls back to localStorage automatically
}

// ── UTILS ──
function uid(){return Math.random().toString(36).slice(2,10);}
function fmt(d){return d.toISOString().slice(0,10);}
function addD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function today(){return fmt(new Date());}
function byId(id){return S.projects.find(p=>p.id===id);}
function isMob(){return window.innerWidth<=640;}

// ── SOUND ──
function getACtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function playSound(type){
  try{
    const ctx=getACtx(), vol=(S.settings.volume||70)/100*0.5;
    const seqs={work:[[523,.1],[659,.1],[784,.14],[1047,.28]],break:[[784,.1],[659,.1],[523,.22]]};
    let t=ctx.currentTime+.05;
    (seqs[type]||seqs.work).forEach(([freq,dur])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.type='sine';
      o.frequency.setValueAtTime(freq,t);g.gain.setValueAtTime(vol,t);
      g.gain.exponentialRampToValueAtTime(.001,t+dur);
      o.start(t);o.stop(t+dur);t+=dur+.04;
    });
  }catch(e){}
}
function testSound(){playSound('work');}
function updVol(v){S.settings.volume=parseInt(v);document.getElementById('svollbl').textContent=v+'%';saveSettings();}

// ── RENDER ──
function renderAll(){
  renderSidebar();
  if(S.view==='dashboard') renderDash();
  if(S.view==='kanban')    renderKanban();
  if(S.view==='calendar')  renderCal();
  if(S.view==='pomodoro')  renderPomo();
  if(S.view==='report')    renderReport();
}

function renderSidebar(){
  document.getElementById('plist').innerHTML=S.projects.map(p=>`
    <div class="proj-item ${S.activeProj===p.id?'active':''}" onclick="selProj('${p.id}')">
      <span class="dot" style="background:${p.color}"></span>
      <span class="pname">${p.title}</span>
    </div>`).join('');
}

function selProj(id){
  S.activeProj = S.activeProj===id ? null : id;
  renderSidebar();
  if(S.view==='kanban') renderKanban();
}

function sv(view, el, fromMobile){
  document.querySelectorAll('.ni,.bni').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll(`[data-v="${view}"]`).forEach(n=>n.classList.add('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  S.view=view;
  const titles={dashboard:'Dashboard',kanban:'Board',calendar:'Calendar',pomodoro:'Pomodoro',report:'Report'};
  document.getElementById('vtitle').textContent=titles[view];
  const acts=document.getElementById('tacts');
  const showTask=(view==='kanban'||view==='dashboard');
  acts.innerHTML=showTask
    ?`<button class="btn btnp" onclick="openTaskModal()"><i class="ri-add-line"></i>New task</button>${view==='dashboard'?'<button class="btn" onclick="openProjModal()"><i class="ri-folder-add-line"></i>New project</button>':''}`
    :'';
  document.getElementById('fab').style.display=showTask?'flex':'none';
  if(view==='dashboard') renderDash();
  if(view==='kanban')    renderKanban();
  if(view==='calendar')  renderCal();
  if(view==='pomodoro')  renderPomo();
  if(view==='report')    renderReport();
}

// ── DASHBOARD ──
function renderDash(){
  const tasks=S.tasks;
  const done=tasks.filter(t=>t.status==='done').length;
  const active=tasks.filter(t=>t.status!=='done').length;
  const td=tasks.filter(t=>t.deadline===today()&&t.status!=='done');
  const ov=tasks.filter(t=>t.deadline&&t.deadline<today()&&t.status!=='done').length;
  const tp=S.sessions.filter(s=>s.completed).length;

  document.getElementById('dstats').innerHTML=`
    <div class="sc"><div class="sl">Active</div><div class="sv">${active}</div><div class="ss">${ov} overdue</div></div>
    <div class="sc"><div class="sl">Done</div><div class="sv">${done}</div><div class="ss">tasks</div></div>
    <div class="sc"><div class="sl">Due today</div><div class="sv" style="color:${td.length?'var(--amber)':'inherit'}">${td.length}</div><div class="ss">tasks</div></div>
    <div class="sc"><div class="sl">Pomodoros</div><div class="sv">${tp}</div><div class="ss">total</div></div>`;

  document.getElementById('dtoday').innerHTML = !td.length
    ? '<div class="es"><i class="ri-check-double-line"></i><p>No tasks due today</p></div>'
    : td.map(t=>{const p=byId(t.projectId);const pm={low:'sb-l',medium:'sb-m',high:'sb-h'};return`<div class="task-row" onclick="openTaskModal('${t.id}')"><span class="dot" style="background:${p?p.color:'#888'}"></span><span class="tn">${t.title}</span><span class="sb ${pm[t.priority]||'sb-m'}">${t.priority}</span></div>`;}).join('');

  document.getElementById('dprojs').innerHTML = !S.projects.length
    ? '<div class="es"><i class="ri-folder-open-line"></i><p>No projects yet</p></div>'
    : S.projects.map(p=>{const pt=S.tasks.filter(t=>t.projectId===p.id),pd=pt.filter(t=>t.status==='done').length,pct=pt.length?Math.round(pd/pt.length*100):0;return`<div class="proj-row" onclick="selProj('${p.id}');sv('kanban',document.querySelector('[data-v=kanban]'))"><span class="dot" style="background:${p.color};width:10px;height:10px;flex-shrink:0"></span><div class="proj-info"><div class="pn">${p.title}</div><div class="pd">${pt.length} tasks · ${pd} done</div></div><div class="prog-wrap"><div class="prog-bg"><div class="prog-fill" style="width:${pct}%;background:${p.color}"></div></div><div class="prog-pct">${pct}%</div></div></div>`;}).join('');
}

// ── KANBAN ──
function renderKanban(){
  const cols=['backlog','todo','in_progress','done'];
  const labels={backlog:'Backlog',todo:'To Do',in_progress:'In Progress',done:'Done'};
  const colors={backlog:'var(--text3)',todo:'var(--blue)',in_progress:'var(--amber)',done:'var(--green)'};
  const ft=S.activeProj?S.tasks.filter(t=>t.projectId===S.activeProj):S.tasks;
  document.getElementById('kboard').innerHTML=cols.map(col=>{
    const ts=ft.filter(t=>t.status===col);
    return`<div class="kcol" id="col-${col}"
      ondragover="event.preventDefault();document.getElementById('col-${col}').classList.add('drop-active')"
      ondragleave="document.getElementById('col-${col}').classList.remove('drop-active')"
      ondrop="dropT(event,'${col}')">
      <div class="col-hdr">
        <span class="col-title" style="color:${colors[col]}">${labels[col]}</span>
        <span class="col-count">${ts.length}</span>
        <button class="col-add" onclick="openTaskModal(null,'${col}')"><i class="ri-add-line"></i></button>
      </div>
      ${ts.length?ts.map(t=>tcHTML(t)).join(''):'<div class="es" style="padding:16px 8px"><i class="ri-inbox-line" style="font-size:20px"></i><p style="font-size:11px">Empty</p></div>'}
    </div>`;
  }).join('');
}

function tcHTML(t){
  const p=byId(t.projectId),dl=t.deadline,ov=dl&&dl<today()&&t.status!=='done';
  const pm={low:'sb-l',medium:'sb-m',high:'sb-h'};
  return`<div class="tc" draggable="true" id="tc-${t.id}"
    ondragstart="dstart(event,'${t.id}')" ondragend="dend()"
    onclick="openTaskModal('${t.id}')">
    <div class="tc-title">${t.title}</div>
    <div class="tc-meta">
      <span class="sb ${pm[t.priority]||'sb-m'}">${t.priority}</span>
      ${p?`<span class="dot" style="background:${p.color}"></span>`:''}
      ${dl?`<span class="tc-dl ${ov?'ov':''}"><i class="ri-calendar-line"></i>${dl.slice(5)}</span>`:''}
      ${t.estimatedPomodoros?`<span class="tc-pomo"><i class="ri-timer-line"></i>${t.completedPomodoros||0}/${t.estimatedPomodoros}</span>`:''}
    </div>
  </div>`;
}

let dragId=null;
function dstart(e,id){dragId=id;setTimeout(()=>document.getElementById('tc-'+id)?.classList.add('dragging'),0);}
function dend(){document.querySelectorAll('.tc').forEach(c=>c.classList.remove('dragging'));}
function dropT(e,status){
  e.preventDefault();document.querySelectorAll('.kcol').forEach(c=>c.classList.remove('drop-active'));
  if(!dragId)return;
  const t=S.tasks.find(t=>t.id===dragId);
  if(t){t.status=status;saveTasks();renderKanban();renderDash();}
  dragId=null;
}

// ── CALENDAR ──
function renderCal(){
  const mob=isMob();
  document.getElementById('cmlbl').textContent=mob?`${MONTHS_S[calM]} ${calY}`:`${MONTHS[calM]} ${calY}`;
  const days=mob?['S','M','T','W','T','F','S']:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const fd=new Date(calY,calM,1).getDay(),dim=new Date(calY,calM+1,0).getDate(),dip=new Date(calY,calM,0).getDate();
  const ts=today();let cells=[];
  for(let i=fd-1;i>=0;i--) cells.push({day:dip-i,m:calM-1,y:calY,o:true});
  for(let d=1;d<=dim;d++) cells.push({day:d,m:calM,y:calY,o:false});
  while(cells.length%7!==0) cells.push({day:cells.length-dim-fd+1,m:calM+1,y:calY,o:true});
  const g=document.getElementById('cgrid');
  g.innerHTML=days.map(d=>`<div class="cal-dn">${d}</div>`).join('');
  cells.forEach(c=>{
    const ds=`${c.y}-${String(c.m+1).padStart(2,'0')}-${String(c.day).padStart(2,'0')}`;
    const dt=S.tasks.filter(t=>t.deadline===ds&&!c.o);const it=ds===ts;
    g.innerHTML+=`<div class="cal-day ${c.o?'other':''} ${it?'today':''}">
      <div class="day-num">${c.day}</div>
      ${dt.slice(0,mob?1:2).map(t=>{const p=byId(t.projectId),col=p?p.color:'#888';return`<div class="cal-task" style="background:${col}20;color:${col};border:1px solid ${col}40" onclick="openTaskModal('${t.id}');event.stopPropagation()">${mob?'●':t.title}</div>`;}).join('')}
      ${dt.length>(mob?1:2)?`<div style="font-size:9px;color:var(--text3)">+${dt.length-(mob?1:2)}</div>`:''}
    </div>`;
  });
}
function calNav(d){
  if(d===0){calY=now.getFullYear();calM=now.getMonth();}
  else{calM+=d;if(calM>11){calM=0;calY++;}else if(calM<0){calM=11;calY--;}}
  renderCal();
}

// ── POMODORO ──
let pTimer=null,pRun=false,pMode='work',pSec=25*60,pTotal=25*60,pSessId=null;

function applyPS(){
  document.getElementById('swrk').value=S.settings.workMin;
  document.getElementById('sbrk').value=S.settings.breakMin;
  if(!pRun){pTotal=(pMode==='work'?S.settings.workMin:S.settings.breakMin)*60;pSec=pTotal;updPD();}
  document.getElementById('twrk').textContent=`Work (${S.settings.workMin}m)`;
  document.getElementById('tbrk').textContent=`Break (${S.settings.breakMin}m)`;
}

function setPMode(m){
  if(pRun)return;pMode=m;
  document.getElementById('twrk').classList.toggle('active',m==='work');
  document.getElementById('tbrk').classList.toggle('active',m==='break');
  pTotal=(m==='work'?S.settings.workMin:S.settings.breakMin)*60;pSec=pTotal;updPD();
}

function toggleP(){pRun?pauseP():startP();}

function startP(){
  if(pMode==='work'&&!pSessId){
    const sel=document.getElementById('ptask').value;
    pSessId=uid();
    S.sessions.push({id:pSessId,taskId:sel||null,projectId:sel?(S.tasks.find(t=>t.id===sel)?.projectId||null):null,startedAt:new Date().toISOString(),duration:S.settings.workMin,completed:false});
  }
  pRun=true;
  document.getElementById('picon').className='ri-pause-fill';
  document.getElementById('ptime').classList.toggle('run',pMode==='work');
  document.getElementById('ptime').classList.toggle('brk',pMode==='break');
  pTimer=setInterval(()=>{pSec--;updPD();if(pSec<=0){clearInterval(pTimer);pTimer=null;pRun=false;pomoComplete();}},1000);
}

function pauseP(){clearInterval(pTimer);pTimer=null;pRun=false;document.getElementById('picon').className='ri-play-fill';document.getElementById('ptime').classList.remove('run','brk');}
function resetP(){pauseP();pSessId=null;pSec=pTotal;updPD();}
function skipP(){pauseP();pSec=0;pomoComplete();}

function pomoComplete(){
  document.getElementById('picon').className='ri-play-fill';
  document.getElementById('ptime').classList.remove('run','brk');
  if(pMode==='work'){
    const sess=S.sessions.find(s=>s.id===pSessId);
    if(sess){
      sess.completed=true;
      if(sess.taskId){const t=S.tasks.find(t=>t.id===sess.taskId);if(t){t.completedPomodoros=(t.completedPomodoros||0)+1;t.timeTracked=(t.timeTracked||0)+S.settings.workMin;}saveTasks();}
      saveSessions();
    }
    pSessId=null;
    playSound('work');
    notify('Pomodoro complete!',`Time for a ${S.settings.breakMin}-min break 🎉`,'🍅');
    setPMode('break');renderPomo();
  }else{
    playSound('break');
    notify('Break over','Ready to focus? ⚡','☕');
    setPMode('work');
  }
}

function updPD(){
  const m=Math.floor(pSec/60),s=pSec%60;
  document.getElementById('ptime').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const pct=pTotal>0?(pSec/pTotal*100):100;
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('pbar').style.background=pMode==='work'?'var(--pomo)':'var(--green)';
}

function renderPomo(){
  const sel=document.getElementById('ptask'),cur=sel.value;
  const at=S.tasks.filter(t=>t.status!=='done');
  sel.innerHTML='<option value="">— No task —</option>'+S.projects.map(p=>{const ts=at.filter(t=>t.projectId===p.id);if(!ts.length)return'';return`<optgroup label="${p.title}">${ts.map(t=>`<option value="${t.id}" ${t.id===cur?'selected':''}>${t.title}</option>`).join('')}</optgroup>`;}).join('');
  const rec=[...S.sessions].filter(s=>s.completed).reverse().slice(0,5);
  document.getElementById('psess').innerHTML=!rec.length
    ?'<div class="es" style="padding:16px 0"><p>No sessions yet — start the timer!</p></div>'
    :rec.map(s=>{const t=s.taskId?S.tasks.find(t=>t.id===s.taskId):null;const p=s.projectId?byId(s.projectId):null;const d=s.startedAt?new Date(s.startedAt).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';return`<div class="sess-row"><i class="ri-timer-flash-line" style="color:var(--pomo)"></i><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t?t.title:'Free session'}</span>${p?`<span class="dot" style="background:${p.color}"></span>`:''}<span style="color:var(--text3);font-size:11px;flex-shrink:0;margin-left:4px">${s.duration}m · ${d}</span></div>`;}).join('');
  const td=S.sessions.filter(s=>s.completed&&s.startedAt&&s.startedAt.slice(0,10)===today()).length;
  document.getElementById('pdots').innerHTML=Array(Math.max(4,td+1)).fill(0).map((_,i)=>`<div class="pdot ${i<td?'on':''}"></div>`).join('');
  document.getElementById('pphase').textContent=pMode==='work'?'FOCUS TIME':'BREAK TIME';
}

function updPS(){
  S.settings.workMin=Math.max(1,Math.min(90,parseInt(document.getElementById('swrk').value)||25));
  S.settings.breakMin=Math.max(1,Math.min(30,parseInt(document.getElementById('sbrk').value)||5));
  saveSettings();
  if(!pRun){pTotal=(pMode==='work'?S.settings.workMin:S.settings.breakMin)*60;pSec=pTotal;updPD();}
  document.getElementById('twrk').textContent=`Work (${S.settings.workMin}m)`;
  document.getElementById('tbrk').textContent=`Break (${S.settings.breakMin}m)`;
}

// ── REPORT ──
function renderReport(){
  const tp=S.sessions.filter(s=>s.completed).length,tm=tp*(S.settings.workMin||25);
  const done=S.tasks.filter(t=>t.status==='done').length;
  const ap=S.projects.filter(p=>S.tasks.some(t=>t.projectId===p.id&&t.status!=='done')).length;
  document.getElementById('rtpomo').textContent=tp;
  document.getElementById('rttime').textContent=`${Math.floor(tm/60)}h ${tm%60}m`;
  document.getElementById('rtdone').textContent=done;
  document.getElementById('rtproj').textContent=ap;
  const tb=document.getElementById('rtbody');
  if(!S.projects.length){tb.innerHTML='<tr><td colspan="5" style="color:var(--text3);text-align:center;padding:20px">No projects yet</td></tr>';return;}
  const mp=Math.max(...S.projects.map(p=>S.sessions.filter(s=>s.projectId===p.id&&s.completed).length),1);
  tb.innerHTML=S.projects.map(p=>{
    const ps=S.sessions.filter(s=>s.projectId===p.id&&s.completed).length;
    const pm=ps*(S.settings.workMin||25);
    const pd=S.tasks.filter(t=>t.projectId===p.id&&t.status==='done').length;
    const bw=Math.round(ps/mp*100);
    return`<tr>
      <td><span class="dot" style="background:${p.color};display:inline-block;margin-right:6px;vertical-align:middle"></span>${p.title}</td>
      <td style="font-family:var(--mono)">${ps}</td>
      <td style="font-family:var(--mono);white-space:nowrap">${Math.floor(pm/60)}h ${pm%60}m</td>
      <td style="font-family:var(--mono)">${pd}</td>
      <td><div style="height:5px;background:var(--bg4);border-radius:3px;width:80px"><div style="height:5px;border-radius:3px;background:${p.color};width:${bw}%"></div></div></td>
    </tr>`;
  }).join('');
}

// ── PROJECT MODAL ──
function openProjModal(id){
  editPid=id||null;
  document.getElementById('pmtitle').textContent=id?'Edit project':'New project';
  const p=id?byId(id):null;
  document.getElementById('pname').value=p?p.title:'';
  document.getElementById('pdesc').value=p?p.description:'';
  document.getElementById('pdeadline').value=p?p.deadline||'':'';
  document.getElementById('pdelbtn').style.display=id?'inline-flex':'none';
  const sc=p?p.color:COLORS[0];
  document.getElementById('cpick').innerHTML=COLORS.map(c=>`<div class="csw ${c===sc?'sel':''}" style="background:${c}" onclick="pickCol('${c}')"></div>`).join('');
  document.getElementById('pmodal').classList.remove('hidden');
}
function pickCol(c){document.querySelectorAll('.csw').forEach(s=>s.classList.toggle('sel',s.style.background===c||s.style.background===h2r(c)));}
function h2r(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgb(${r}, ${g}, ${b})`;}
function r2h(rgb){const m=rgb.match(/\d+/g);if(!m||m.length<3)return'#888';return'#'+[m[0],m[1],m[2]].map(x=>parseInt(x).toString(16).padStart(2,'0')).join('');}
function closeProjModal(){document.getElementById('pmodal').classList.add('hidden');editPid=null;}
async function saveProj(){
  const name=document.getElementById('pname').value.trim();
  if(!name){document.getElementById('pname').focus();return;}
  const sel=document.querySelector('.csw.sel');
  const col=sel?sel.style.background:COLORS[0];
  const colH=col.startsWith('#')?col:r2h(col);
  if(editPid){
    const p=byId(editPid);
    if(p){p.title=name;p.description=document.getElementById('pdesc').value.trim();p.deadline=document.getElementById('pdeadline').value;p.color=colH;}
    await upsertRow('projects',editPid,p);
  }else{
    const np={id:uid(),title:name,description:document.getElementById('pdesc').value.trim(),color:colH,deadline:document.getElementById('pdeadline').value,createdAt:new Date().toISOString()};
    S.projects.push(np);
    await upsertRow('projects',np.id,np);
  }
  closeProjModal();renderAll();
}
async function delProj(){
  if(!editPid)return;
  S.tasks=S.tasks.filter(t=>t.projectId!==editPid);
  if(db){await db.from('tasks').delete().eq('data->>projectId',editPid);}
  await deleteRow('projects',editPid);
  S.projects=S.projects.filter(p=>p.id!==editPid);
  if(S.activeProj===editPid)S.activeProj=null;
  closeProjModal();renderAll();
}

// ── TASK MODAL ──
function openTaskModal(id,status){
  editTid=id||null;defStat=status||'todo';
  document.getElementById('tmtitle').textContent=id?'Edit task':'New task';
  const t=id?S.tasks.find(t=>t.id===id):null;
  document.getElementById('ttitle').value=t?t.title:'';
  document.getElementById('tdesc').value=t?t.description||'':'';
  document.getElementById('tdl').value=t?t.deadline||'':'';
  document.getElementById('tstat').value=t?t.status:defStat;
  document.getElementById('tprio').value=t?t.priority:'medium';
  document.getElementById('tpomo').value=t?t.estimatedPomodoros||1:1;
  const ps=document.getElementById('tproj');
  ps.innerHTML=S.projects.map(p=>`<option value="${p.id}" ${(t&&t.projectId===p.id)||(S.activeProj===p.id)?'selected':''}>${p.title}</option>`).join('');
  document.getElementById('tdelbtn').style.display=id?'inline-flex':'none';
  document.getElementById('tmodal').classList.remove('hidden');
}
function closeTaskModal(){document.getElementById('tmodal').classList.add('hidden');editTid=null;}
async function saveTask(){
  const title=document.getElementById('ttitle').value.trim();
  if(!title){document.getElementById('ttitle').focus();return;}
  const pid=document.getElementById('tproj').value;if(!pid)return;
  const d={title,projectId:pid,description:document.getElementById('tdesc').value.trim(),status:document.getElementById('tstat').value,priority:document.getElementById('tprio').value,deadline:document.getElementById('tdl').value,estimatedPomodoros:parseInt(document.getElementById('tpomo').value)||1};
  if(editTid){
    const t=S.tasks.find(t=>t.id===editTid);
    if(t)Object.assign(t,d);
    await upsertRow('tasks',editTid,t);
  }else{
    const nt={id:uid(),completedPomodoros:0,timeTracked:0,createdAt:new Date().toISOString(),...d};
    S.tasks.push(nt);
    await upsertRow('tasks',nt.id,nt);
  }
  closeTaskModal();renderAll();
}
async function delTask(){
  if(!editTid)return;
  await deleteRow('tasks',editTid);
  S.tasks=S.tasks.filter(t=>t.id!==editTid);
  closeTaskModal();renderAll();
}

// ── NOTIFICATIONS ──
let notifStack=[];
function notify(title,body,icon){
  const el=document.createElement('div');el.className='notif';
  el.innerHTML=`<div class="notif-icon">${icon||'🔔'}</div><div class="notif-body"><h4>${title}</h4><p>${body}</p></div>`;
  document.getElementById('app').appendChild(el);
  notifStack.push(el);
  notifStack.forEach((n,i)=>{n.style.top=(12+i*74)+'px';});
  setTimeout(()=>{el.remove();notifStack=notifStack.filter(n=>n!==el);notifStack.forEach((n,i)=>{n.style.top=(12+i*74)+'px';});},4000);
}

// ── EVENTS ──
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeTaskModal();closeProjModal();}
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){openTaskModal();e.preventDefault();}
});
document.getElementById('pmodal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeProjModal();});
document.getElementById('tmodal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeTaskModal();});
document.addEventListener('click',()=>{try{getACtx();}catch(e){}},{once:true});
window.addEventListener('resize',()=>{if(S.view==='calendar')renderCal();});

// ── BOOT ──
initDB();
</script>
</body>
